<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Publisher Pricing Analyzer</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <header>
    <span class="logo-title">📊 تحلیل قیمت ناشر</span>
    <button id="close-btn" title="بستن">✕</button>
  </header>

  <!-- Page info (appears after scan) -->
  <div id="page-info" class="info-bar hidden">
    <span id="page-host" class="host"></span>
    <span id="app-id-badge" class="app-badge"></span>
  </div>

  <!-- Step 1: Date range -->
  <div class="section">
    <div id="data-status" class="data-status loading">در حال بارگذاری داده‌ها...</div>
    <div class="date-group">
      <label>از تاریخ</label>
      <div class="date-row">
        <select id="from-year" class="sel-year"></select>
        <select id="from-month" class="sel-month"></select>
        <select id="from-day" class="sel-day"></select>
      </div>
    </div>
    <div class="date-group">
      <label>تا تاریخ</label>
      <div class="date-row">
        <select id="to-year" class="sel-year"></select>
        <select id="to-month" class="sel-month"></select>
        <select id="to-day" class="sel-day"></select>
      </div>
    </div>
    <button id="analyze-btn" disabled>آنالیز کن</button>
  </div>

  <!-- Results -->
  <div id="results-section" class="hidden">
    <div class="total-rpm-card">
      <div class="total-rpm-label">RPM کل ناشر</div>
      <div id="total-rpm" class="total-rpm-value">—</div>
      <div id="publisher-name" class="publisher-name"></div>
    </div>
    <div id="positions-list" class="positions-list"></div>
    <div class="more-row">
      <button id="more-btn" class="more-btn">📸 گزارش تصویری</button>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="loading-overlay hidden">
    <div class="spinner"></div>
    <div id="loading-text" class="loading-text">در حال پردازش...</div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
