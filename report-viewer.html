<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>گزارش ناشر · یکتانت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #FED049;
      --ink: #1c1917;
      --bg: #fafaf9;
      --card: #ffffff;
      --border: #e7e5e4;
      --text: #1c1917;
      --muted: #78716c;
      --subtle: #f5f5f4;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#0c0a09; --card:#1c1917; --border:#292524; --text:#fafaf9; --muted:#a8a29e; --subtle:#231f1d; }
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Vazirmatn',Tahoma,sans-serif; background:var(--bg); color:var(--text); direction:rtl; min-height:100vh; }
    .hdr { background:#1c1917; color:#fff; padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; gap:16px; position:sticky; top:0; z-index:200; }
    .hdr-brand { display:flex; align-items:center; gap:12px; }
    .y-logo { width:34px; height:34px; background:var(--accent); color:#1c1917; border-radius:8px; font-size:17px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .hdr-name { font-size:15px; font-weight:600; }
    .hdr-meta { font-size:11px; color:#a8a29e; margin-top:2px; }
    .rpm-pill { background:var(--accent); color:#1c1917; padding:8px 16px; border-radius:10px; display:flex; align-items:baseline; gap:5px; flex-shrink:0; }
    .rpm-pill-val { font-size:22px; font-weight:700; }
    .rpm-pill-lbl { font-size:10px; font-weight:500; opacity:.7; }
    .main { max-width:1120px; margin:0 auto; padding:28px 24px 64px; }
    .sec-lbl { font-size:11px; font-weight:700; letter-spacing:.06em; color:var(--muted); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .sec-lbl::before { content:''; display:block; width:3px; height:14px; background:var(--accent); border-radius:2px; }
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:12px; margin-bottom:36px; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
    .stat-card-lbl { font-size:11px; color:var(--muted); margin-bottom:6px; }
    .stat-card-val { font-size:26px; font-weight:700; line-height:1; }
    .stat-card-unit { font-size:11px; color:var(--muted); margin-top:5px; }
    .chart-section { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px 24px 18px; margin-bottom:28px; }
    .chart-empty { padding:32px; text-align:center; color:var(--muted); font-size:13px; background:var(--subtle); border-radius:8px; }
    .outlook-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:36px; }
    .outlook-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; text-align:center; position:relative; }
    .outlook-card.realistic { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
    .outlook-badge { position:absolute; top:12px; left:12px; font-size:10px; font-weight:600; background:var(--subtle); color:var(--muted); padding:3px 8px; border-radius:4px; }
    .outlook-card.realistic .outlook-badge { background:var(--accent); color:#1c1917; }
    .outlook-icon { font-size:30px; margin-bottom:6px; margin-top:6px; }
    .outlook-title { font-size:13px; font-weight:600; color:var(--muted); margin-bottom:18px; }
    .outlook-rpm { font-size:34px; font-weight:700; color:var(--accent); line-height:1; margin-bottom:4px; }
    .outlook-rpm-lbl { font-size:10px; color:var(--muted); margin-bottom:14px; }
    .outlook-divider { height:1px; background:var(--border); margin:14px 0; }
    .outlook-revenue { font-size:19px; font-weight:600; }
    .outlook-revenue-lbl { font-size:10px; color:var(--muted); margin-top:4px; }
    .pos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:12px; }
    details.pos-card { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color .15s; }
    details.pos-card[open] { border-color:var(--accent); }
    summary.pos-summary { padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; list-style:none; user-select:none; }
    summary.pos-summary::-webkit-details-marker { display:none; }
    .pos-icon { width:38px; height:38px; flex-shrink:0; background:var(--subtle); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--muted); }
    .pos-info { flex:1; min-width:0; }
    .pos-name { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:2px; }
    .pos-sub { font-size:10px; color:var(--muted); }
    .pos-spark { width:72px; height:26px; flex-shrink:0; }
    .pos-rpm-col { text-align:left; flex-shrink:0; min-width:56px; }
    .pos-rpm-val { font-size:18px; font-weight:700; color:var(--accent); line-height:1; }
    .pos-rpm-unit { font-size:9px; color:var(--muted); }
    .pos-expand { padding:4px 16px 14px; border-top:1px solid var(--border); }
    .pos-expand-lbl { font-size:10px; font-weight:600; color:var(--muted); margin:10px 0 8px; letter-spacing:.04em; }
    .pos-no-data { opacity:.5; }
    .pos-no-data summary { cursor:default; }
    #loading { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
    .ld-logo { width:50px; height:50px; background:var(--accent); color:#1c1917; border-radius:13px; font-size:25px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-bottom:4px; }
    #loading p { font-size:14px; }
    @media (max-width:640px) { .outlook-row{grid-template-columns:1fr} .hdr{padding:0 16px;height:56px} .main{padding:16px 14px 40px} }
  </style>
</head>
<body>
<div id="loading"><div class="ld-logo">Y</div><p>در حال بارگذاری گزارش...</p></div>
<div id="root" style="display:none;"></div>
<script src="report-viewer.js"></script>
</body>
</html>
