<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>گزارش ناشر · یکتانت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #FED049;
      --ink: #1c1917;
      --bg: #fafaf9;
      --card: #ffffff;
      --border: #e7e5e4;
      --text: #1c1917;
      --muted: #78716c;
      --subtle: #f5f5f4;
      --success: #10b981;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0a09;
        --card: #1c1917;
        --border: #292524;
        --text: #fafaf9;
        --muted: #a8a29e;
        --subtle: #231f1d;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Vazirmatn', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────────────── */
    .hdr {
      background: var(--ink);
      color: #fff;
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .hdr-brand { display: flex; align-items: center; gap: 10px; }
    .y-logo {
      width: 30px; height: 30px;
      background: var(--accent); color: var(--ink);
      border-radius: 7px;
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hdr-name { font-size: 14px; font-weight: 600; }
    .hdr-meta { font-size: 11px; color: #a8a29e; margin-top: 2px; }
    .rpm-pill {
      background: var(--accent); color: var(--ink);
      padding: 7px 14px;
      border-radius: 10px;
      display: flex; align-items: baseline; gap: 4px;
      flex-shrink: 0;
    }
    .rpm-pill-val { font-size: 20px; font-weight: 700; }
    .rpm-pill-unit { font-size: 11px; font-weight: 500; opacity: .75; }

    /* ── Grid ──────────────────────────────────────────────────── */
    .grid-wrap { padding: 20px 28px 48px; }
    .grid-head {
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      margin-bottom: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    /* ── Card ──────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,.1);
      border-color: var(--accent);
    }
    .card.no-data { opacity: .55; cursor: default; }
    .card.no-data:hover { transform: none; box-shadow: none; border-color: var(--border); }
    .card-thumb { width: 100%; aspect-ratio: 3/1; object-fit: cover; display: block; background: var(--subtle); }
    .card-placeholder {
      width: 100%; aspect-ratio: 3/1;
      background: var(--subtle);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: var(--muted);
    }
    .card-body { padding: 10px 12px 12px; }
    .card-pid { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .card-label {
      font-size: 13px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 8px;
    }
    .card-rpm { font-size: 26px; font-weight: 700; color: var(--accent); line-height: 1; }
    .card-rpm.na { font-size: 14px; color: var(--muted); }
    .card-rpm-unit { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .card-chips {
      display: flex; gap: 5px; flex-wrap: wrap;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .chip {
      background: var(--subtle);
      border-radius: 4px; padding: 2px 7px;
      font-size: 10px; color: var(--muted);
    }

    /* ── Overlay ───────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 1000;
      align-items: flex-start; justify-content: center;
      padding: 28px 16px 48px;
      overflow-y: auto;
    }
    .overlay.open { display: flex; }

    /* ── Modal ─────────────────────────────────────────────────── */
    .mbox {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 700px; width: 100%;
      margin: auto;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.4);
    }
    .mhdr {
      background: var(--ink); color: #fff;
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .mhdr-pid { font-size: 11px; opacity: .5; margin-bottom: 2px; }
    .mhdr-name { font-size: 15px; font-weight: 600; }
    .mbtn-close {
      background: rgba(255,255,255,.12); border: none; color: #fff;
      width: 30px; height: 30px; border-radius: 7px;
      cursor: pointer; font-size: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .mbtn-close:hover { background: rgba(255,255,255,.25); }
    .mbody { padding: 18px; }

    .m-screenshot {
      width: 100%; max-height: 260px; object-fit: contain;
      border-radius: 8px; border: 1px solid var(--border);
      display: block; margin-bottom: 16px; background: var(--subtle);
    }
    .m-no-img {
      height: 100px; background: var(--subtle); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 16px;
    }
    .m-rpm-hero { text-align: center; margin-bottom: 16px; }
    .m-rpm-num { font-size: 52px; font-weight: 700; color: var(--accent); line-height: 1; }
    .m-rpm-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .m-stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 16px;
    }
    .stat { background: var(--subtle); border-radius: 8px; padding: 10px 12px; }
    .stat-l { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
    .stat-v { font-size: 16px; font-weight: 600; }

    .chart-hdr {
      font-size: 12px; font-weight: 600; color: var(--muted);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .chart-hdr::before {
      content: ""; display: inline-block;
      width: 3px; height: 13px;
      background: var(--accent); border-radius: 2px;
    }
    .chart-svg { display: block; width: 100%; overflow: visible; }
    .chart-empty {
      padding: 24px; text-align: center;
      color: var(--muted); font-size: 13px;
      background: var(--subtle); border-radius: 8px;
    }

    /* ── Loading ───────────────────────────────────────────────── */
    #loading {
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: var(--muted);
    }
    .ld-logo {
      width: 44px; height: 44px;
      background: var(--accent); color: var(--ink);
      border-radius: 12px; font-size: 22px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }
    #loading p { font-size: 14px; }
  </style>
</head>
<body>

<div id="loading">
  <div class="ld-logo">Y</div>
  <p>در حال بارگذاری گزارش...</p>
</div>

<div id="root" style="display:none;"></div>

<div id="overlay" class="overlay">
  <div class="mbox">
    <div class="mhdr">
      <div>
        <div class="mhdr-pid" id="m-pid"></div>
        <div class="mhdr-name" id="m-name"></div>
      </div>
      <button class="mbtn-close" id="m-close">✕</button>
    </div>
    <div class="mbody" id="m-body"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  function toFa(s) {
    return String(s).replace(/[0-9]/g, function (d) { return '۰۱۲۳۴۵۶۷۸۹'[+d]; });
  }
  function fmtRpm(n) { return n != null ? toFa((Math.round(n * 100) / 100).toFixed(2)) : '—'; }
  function fmtNum(n) { return n != null ? toFa(Math.round(n).toLocaleString('en')) : '—'; }
  function fmtDate(iso) { return iso ? toFa(iso.replace(/-/g, '/')) : ''; }

  var data = null;

  chrome.storage.local.get('ynprice_report', function (result) {
    document.getElementById('loading').style.display = 'none';
    if (!result.ynprice_report) {
      document.getElementById('root').style.display = '';
      document.getElementById('root').innerHTML =
        '<div style="height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;">' +
        '<div style="font-size:48px">😕</div>' +
        '<div style="font-size:16px;font-weight:600;">گزارشی یافت نشد</div>' +
        '<div style="font-size:13px;color:var(--muted);">لطفاً دوباره از اکستنشن گزارش بگیرید.</div>' +
        '</div>';
      return;
    }
    data = result.ynprice_report;
    render(data);
    document.getElementById('root').style.display = '';
  });

  // ── Render ────────────────────────────────────────────────────
  function render(d) {
    var root = document.getElementById('root');

    var hdr = document.createElement('div');
    hdr.className = 'hdr';
    hdr.innerHTML =
      '<div class="hdr-brand">' +
        '<div class="y-logo">Y</div>' +
        '<div>' +
          '<div class="hdr-name">' + esc(d.publisherName || 'گزارش ناشر') + '</div>' +
          '<div class="hdr-meta">' + fmtDate(d.from) + ' — ' + fmtDate(d.to) + ' &nbsp;·&nbsp; ' + esc(d.appId) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="rpm-pill">' +
        '<span class="rpm-pill-val">' + fmtRpm(d.totalRpm) + '</span>' +
        '<span class="rpm-pill-unit">K تومان / ۱K</span>' +
      '</div>';
    root.appendChild(hdr);

    var wrap = document.createElement('div');
    wrap.className = 'grid-wrap';
    wrap.innerHTML =
      '<div class="grid-head">جایگاه‌های شناسایی‌شده &nbsp;·&nbsp; ' +
      toFa(d.matched.length) + ' جایگاه</div>';

    var grid = document.createElement('div');
    grid.className = 'grid';

    d.matched.forEach(function (item, idx) {
      grid.appendChild(makeCard(item, idx));
    });

    (d.unmatched || []).forEach(function (pid) {
      var card = document.createElement('div');
      card.className = 'card no-data';
      card.innerHTML =
        '<div class="card-placeholder">—</div>' +
        '<div class="card-body">' +
          '<div class="card-pid">ynpos-' + toFa(pid) + '</div>' +
          '<div class="card-label">جایگاه ' + toFa(pid) + '</div>' +
          '<div class="card-rpm na">بدون داده</div>' +
        '</div>';
      grid.appendChild(card);
    });

    wrap.appendChild(grid);
    root.appendChild(wrap);
  }

  function makeCard(item, idx) {
    var card = document.createElement('div');
    var cn = 'card';
    if (item.rpm == null) cn += ' no-data';
    card.className = cn;
    if (item.rpm != null) card.onclick = function () { openModal(idx); };

    var thumb = item.screenshot
      ? '<img class="card-thumb" src="' + item.screenshot + '" loading="lazy" />'
      : '<div class="card-placeholder">' + (item.mobileOnly ? '📱' : '📷') + '</div>';

    var rpmHtml = item.rpm != null
      ? '<div class="card-rpm">' + fmtRpm(item.rpm) + '</div>' +
        '<div class="card-rpm-unit">K تومان / ۱K نمایش</div>'
      : '<div class="card-rpm na">بدون داده</div>';

    var chips = '';
    if (item.rowCount) chips += '<span class="chip">' + toFa(item.rowCount) + ' روز</span>';
    if (item.positionType) chips += '<span class="chip">' + esc(item.positionType) + '</span>';
    if (item.mobileOnly) chips += '<span class="chip">موبایل</span>';

    card.innerHTML =
      thumb +
      '<div class="card-body">' +
        '<div class="card-pid">ynpos-' + toFa(item.positionId) + '</div>' +
        '<div class="card-label">' + esc(item.description || 'جایگاه ' + item.positionId) + '</div>' +
        rpmHtml +
        (chips ? '<div class="card-chips">' + chips + '</div>' : '') +
      '</div>';
    return card;
  }

  // ── Modal ─────────────────────────────────────────────────────
  function openModal(idx) {
    var item = data.matched[idx];

    document.getElementById('m-pid').textContent = 'ynpos-' + item.positionId;
    document.getElementById('m-name').textContent = item.description || ('جایگاه ' + item.positionId);

    var body = document.getElementById('m-body');

    var imgHtml = item.screenshot
      ? '<img class="m-screenshot" src="' + item.screenshot + '" />'
      : '<div class="m-no-img">' + (item.mobileOnly ? '📱' : '📷') + '</div>';

    var avgPv = item.rowCount ? Math.round((item.totalPv || 0) / item.rowCount) : 0;

    body.innerHTML =
      imgHtml +
      '<div class="m-rpm-hero">' +
        '<div class="m-rpm-num">' + fmtRpm(item.rpm) + '</div>' +
        '<div class="m-rpm-label">میانگین RPM · هزار تومان به ازای ۱,۰۰۰ نمایش</div>' +
      '</div>' +
      '<div class="m-stats">' +
        '<div class="stat"><div class="stat-l">روزهای داده</div><div class="stat-v">' + toFa(item.rowCount || 0) + '</div></div>' +
        '<div class="stat"><div class="stat-l">میانگین PV/روز</div><div class="stat-v">' + fmtNum(avgPv) + '</div></div>' +
        '<div class="stat"><div class="stat-l">مجموع هزینه تبلیغات</div><div class="stat-v" style="font-size:13px">' + fmtNum(item.totalAdv) + '</div></div>' +
      '</div>' +
      '<div class="chart-hdr">هیستوری روزانه RPM</div>' +
      buildChart(item.rows || []);

    document.getElementById('overlay').classList.add('open');
  }

  // ── History chart ─────────────────────────────────────────────
  function buildChart(rows) {
    var pts = rows
      .filter(function (r) { return r[2] > 0; })
      .map(function (r) { return { date: r[0], rpm: r[1] / r[2] }; })
      .sort(function (a, b) { return a.date < b.date ? -1 : 1; });

    if (pts.length < 2) {
      return '<div class="chart-empty">داده‌ی کافی برای نمایش نمودار وجود ندارد</div>';
    }

    var W = 640, H = 150, pL = 52, pR = 12, pT = 12, pB = 36;
    var cW = W - pL - pR, cH = H - pT - pB;

    var rpms = pts.map(function (p) { return p.rpm; });
    var mn = Math.min.apply(null, rpms);
    var mx = Math.max.apply(null, rpms);
    var rng = mx - mn || 1;

    var coords = pts.map(function (p, i) {
      return {
        x: pL + (i / (pts.length - 1)) * cW,
        y: pT + (1 - (p.rpm - mn) / rng) * cH,
        date: p.date
      };
    });

    var linePath = coords.map(function (c, i) {
      return (i === 0 ? 'M' : 'L') + c.x.toFixed(1) + ',' + c.y.toFixed(1);
    }).join(' ');

    var areaPath = linePath +
      ' L' + coords[coords.length - 1].x.toFixed(1) + ',' + (pT + cH) +
      ' L' + pL + ',' + (pT + cH) + ' Z';

    var yTicks = [0, 0.25, 0.5, 0.75, 1].map(function (t) {
      return { y: pT + (1 - t) * cH, label: toFa(Math.round(mn + t * rng)) };
    });

    var xCount = Math.min(6, pts.length);
    var xIdxs = [];
    for (var j = 0; j < xCount; j++) {
      xIdxs.push(Math.round(j / Math.max(xCount - 1, 1) * (pts.length - 1)));
    }

    var gridLines = yTicks.map(function (t) {
      return '<line x1="' + pL + '" y1="' + t.y.toFixed(1) +
        '" x2="' + (W - pR) + '" y2="' + t.y.toFixed(1) +
        '" stroke="currentColor" stroke-opacity="0.08" stroke-width="1"/>';
    }).join('');

    var yLabels = yTicks.map(function (t) {
      return '<text x="' + (pL - 5) + '" y="' + (t.y + 4).toFixed(1) +
        '" text-anchor="end" font-size="10" fill="currentColor" opacity="0.5">' +
        t.label + '</text>';
    }).join('');

    var xLabels = xIdxs.map(function (i) {
      var c = coords[i];
      return '<text x="' + c.x.toFixed(1) + '" y="' + (H - 6) +
        '" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.5">' +
        toFa(c.date.slice(5)) + '</text>';
    }).join('');

    return '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H +
      '" xmlns="http://www.w3.org/2000/svg">' +
      '<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#FED049" stop-opacity="0.35"/>' +
      '<stop offset="100%" stop-color="#FED049" stop-opacity="0"/>' +
      '</linearGradient></defs>' +
      gridLines +
      '<path d="' + areaPath + '" fill="url(#cg)"/>' +
      '<path d="' + linePath + '" fill="none" stroke="#FED049" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
      yLabels + xLabels +
      '</svg>';
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.getElementById('m-close').addEventListener('click', function () {
    document.getElementById('overlay').classList.remove('open');
  });
  document.getElementById('overlay').addEventListener('click', function (e) {
    if (e.target === this) document.getElementById('overlay').classList.remove('open');
  });
})();
</script>
</body>
</html>
